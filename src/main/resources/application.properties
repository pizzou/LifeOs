spring.application.name=lifeos-api
server.port=${PORT:8080}
spring.datasource.url=jdbc:postgresql://localhost:5432/lifeos_db
spring.datasource.username=postgres
spring.datasource.password=Mpumuro@2025
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.keepalive-time=60000
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=false
app.jwt.secret=${JWT_SECRET:lifeos_super_secure_jwt_secret_key_minimum_32_chars_2026}
app.jwt.expiration-ms=86400000
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:8081,http://192.168.1.66:8081,http://192.168.1.66:8080,*}
management.endpoints.web.exposure.include=health,info
logging.level.com.lifeos=INFO
logging.level.org.springframework.security=WARN
